name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify release version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCK_VERSION=$(node -p "require('./package-lock.json').packages[''].version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) must match package.json ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          if [ "$LOCK_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "package-lock.json version ($LOCK_VERSION) must match package.json ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Verify publish metadata
        run: npm --cache .tmp/npm-cache publish --dry-run --access public

  release:
    name: Create GitHub release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "create-notion-auto-lock-worker@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "create-notion-auto-lock-worker@$PACKAGE_VERSION is already published; skipping publish."
            exit 0
          fi

          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
